<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Fantaschedone</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      padding: 20px;
    }
    .box {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    td, th {
      padding: 10px;
      border-bottom: 1px solid #ccc;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>⚽ Fantaschedone – Prossime partite Serie A</h2>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Partita</th>
        <th>Data</th>
      </tr>
    </thead>
    <tbody id="lista">
      <tr><td colspan="3">⏳ Caricamento...</td></tr>
    </tbody>
  </table>
</div>

<script>
const API_KEY = "40e94a409232598ba1cfd36efe3ad91d";

async function carica() {

  const url = "https://v3.football.api-sports.io/fixtures?league=135&season=2024&next=10";

  try {
    const r = await fetch(url, {
      headers: { "x-apisports-key": API_KEY }
    });

    const json = await r.json();
    console.log(json);

    const tbody = document.getElementById("lista");
    tbody.innerHTML = "";

    json.response.forEach((f, i) => {
      const data = new Date(f.fixture.date).toLocaleString();
      tbody.innerHTML += `
        <tr>
          <td>${i + 1}</td>
          <td>${f.teams.home.name} - ${f.teams.away.name}</td>
          <td>${data}</td>
        </tr>
      `;
    });

  } catch (e) {
    document.getElementById("lista").innerHTML =
      "<tr><td colspan='3'>❌ Errore API</td></tr>";
  }
}

carica();
</script>

</body>
</html>
