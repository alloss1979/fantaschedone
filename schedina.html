<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Fantaschedone – Schedina</title>
  <link rel="stylesheet" href="css/stile.css">
</head>
<body>

<div class="card">
  <h2>⚽ Fantaschedone</h2>

  <p id="utente"></p>
  <p id="info"></p>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Partita</th>
        <th>Pronostico</th>
        <th>Risultato</th>
      </tr>
    </thead>
    <tbody id="tabella">
      <tr><td colspan="4">⏳ Caricamento partite...</td></tr>
    </tbody>
  </table>

  <br>
  <button onclick="gioca()">Invia schedina</button>

  <h3 id="esito"></h3>
</div>

<script>
/* ======================
   CONFIG
====================== */
const API_KEY = "40e94a409232598ba1cfd36efe3ad91d";

/* ⚠️ DATA SICURA CON SERIE A */
const DATA_PARTITE = "2025-09-21";

/* STAGIONE CORRETTA */
const STAGIONE = 2025;

/* ======================
   UTENTE
====================== */
let utente = localStorage.getItem("utente") || "demo";
localStorage.setItem("utente", utente);
document.getElementById("utente").innerText = "👤 Utente: " + utente;

let partite = [];

/* ======================
   CARICA PARTITE REALI
====================== */
async function caricaPartite() {

  const url = `https://v3.football.api-sports.io/fixtures?league=135&season=${STAGIONE}&date=${DATA_PARTITE}`;

  try {
    const r = await fetch(url, {
      headers: { "x-apisports-key": API_KEY }
    });

    const json = await r.json();

    console.log("RISPOSTA API:", json);

    if (!json.response || json.response.length === 0) {
      document.getElementById("tabella").innerHTML =
        "<tr><td colspan='4'>❌ Nessuna partita trovata</td></tr>";
      return;
    }

    partite = json.response.map(f => {
      let g1 = f.goals.home;
      let g2 = f.goals.away;

      let segno = "-";
      if (g1 !== null) {
        if (g1 > g2) segno = "1";
        else if (g1 < g2) segno = "2";
        else segno = "X";
      }

      return {
        casa: f.teams.home.name,
        trasferta: f.teams.away.name,
        risultato: segno
      };
    });

    disegna();

  } catch (e) {
    console.error("ERRORE API:", e);
    document.getElementById("tabella").innerHTML =
      "<tr><td colspan='4'>❌ Errore API (vedi console)</td></tr>";
  }
}

/* ======================
   DISEGNA TABELLA
====================== */
function disegna() {
  let h = "";
  partite.forEach((p, i) => {
    h += `
      <tr>
        <td>${i + 1}</td>
        <td>${p.casa} - ${p.trasferta}</td>
        <td>
          <input type="radio" name="p${i}" value="1">1
          <input type="radio" name="p${i}" value="X">X
          <input type="radio" name="p${i}" value="2">2
        </td>
        <td>${p.risultato}</td>
      </tr>
    `;
  });
  document.getElementById("tabella").innerHTML = h;
}

/* ======================
   CALCOLO PUNTI
====================== */
function gioca() {
  let punti = 0;

  partite.forEach((p, i) => {
    let s = document.querySelector(`input[name="p${i}"]:checked`);
    if (s && s.value === p.risultato) punti++;
  });

  document.getElementById("esito").innerText =
    "✅ Punti: " + punti;
}

/* ======================
   AVVIO
====================== */
caricaPartite();
</script>

</body>
</html>
