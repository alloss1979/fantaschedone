<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Fantaschedone – Schedina</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    table {
      width: 100%;
      max-width: 900px;
      margin: auto;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }

    th {
      background: #2c7be5;
      color: white;
    }

    .pronostici input {
      margin: 0 5px;
      transform: scale(1.3);
    }

    #gioca {
      display: block;
      margin: 20px auto;
      padding: 12px 30px;
      font-size: 18px;
      background: #28a745;
      color: white;
      border: none;
      cursor: pointer;
    }

    #gioca:hover {
      background: #218838;
    }

    #stato {
      text-align: center;
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>⚽ Fantaschedone – Schedina</h1>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Partita</th>
      <th>Pronostico</th>
    </tr>
  </thead>
  <tbody id="tabella">
    <tr>
      <td colspan="3">⏳ Caricamento partite…</td>
    </tr>
  </tbody>
</table>

<button id="gioca">Gioca schedina</button>

<div id="stato"></div>

<script>
/* =========================
   CONFIG
========================= */
const WORKER_URL = "https://fantaschedone-api.alloss1979.workers.dev";

/* =========================
   VARIABILI
========================= */
let partite = [];

/* =========================
   CARICA PARTITE
========================= */
async function caricaPartite() {
  try {
    const res = await fetch(WORKER_URL);
    const data = await res.json();

    console.log("DATI RICEVUTI:", data);

    if (!data.response || data.response.length === 0) {
      document.getElementById("tabella").innerHTML =
        "<tr><td colspan='3'>❌ Nessuna partita trovata</td></tr>";
      return;
    }

    partite = data.response.slice(0, 13);

    disegnaPartite();

  } catch (err) {
    console.error(err);
    document.getElementById("tabella").innerHTML =
      "<tr><td colspan='3'>❌ Errore caricamento</td></tr>";
  }
}

/* =========================
   DISEGNA TABELLA
========================= */
function disegnaPartite() {
  let html = "";

  partite.forEach((p, i) => {
    html += `
      <tr>
        <td>${i + 1}</td>
        <td>${p.teams.home.name} - ${p.teams.away.name}</td>
        <td class="pronostici">
          <label><input type="radio" name="p${i}" value="1"> 1</label>
          <label><input type="radio" name="p${i}" value="X"> X</label>
          <label><input type="radio" name="p${i}" value="2"> 2</label>
        </td>
      </tr>
    `;
  });

  document.getElementById("tabella").innerHTML = html;
}

/* =========================
   GIOCA
========================= */
document.getElementById("gioca").onclick = () => {
  let scelti = 0;

  partite.forEach((_, i) => {
    if (document.querySelector(`input[name="p${i}"]:checked`)) {
      scelti++;
    }
  });

  document.getElementById("stato").innerText =
    `✅ Pronostici selezionati: ${scelti} / ${partite.length}`;
};

/* =========================
   AVVIO
========================= */
caricaPartite();
</script>

</body>
</html>
