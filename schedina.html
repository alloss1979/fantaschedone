<!DOCTYPE html>
<html>
<head>
  <title>Schedina – Fantaschedone</title>
  <link rel="stylesheet" href="css/stile.css">
</head>
<body>

<h2>Schedina</h2>

<p id="utente"></p>
<p id="crediti"></p>

<select id="giornata" onchange="carica()">
  <option value="">Seleziona giornata</option>
  <option value="giornata1.json">Giornata 1</option>
  <option value="giornata2.json">Giornata 2</option>
</select>

<p id="blocco"></p>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Partita</th>
      <th>Pronostico</th>
    </tr>
  </thead>
  <tbody id="partite"></tbody>
</table>

<br>
<button id="gioca" onclick="gioca()">Invia schedina</button>

<script>
let u = localStorage.getItem("utente");
if(!u) location.href="login.html";

document.getElementById("utente").innerText="Utente: "+u;
document.getElementById("crediti").innerText=
  "Crediti: "+localStorage.getItem("crediti_"+u);

let giornata;

function carica(){
  let f=document.getElementById("giornata").value;
  fetch(f).then(r=>r.json()).then(d=>{
    giornata=d;
    mostra();
  });
}

function mostra(){
  let ora=new Date();
  let blocco=new Date(giornata.blocco);
  document.getElementById("blocco").innerText=
    "Blocco: "+blocco.toLocaleString();

  if(ora>=blocco){
    document.getElementById("gioca").disabled=true;
  }

  let h="";
  giornata.partite.forEach((p,i)=>{
    h+=`
      <tr>
        <td>${i+1}</td>
        <td>${p.casa} - ${p.trasferta}</td>
        <td>
          <input type="radio" name="p${i}" value="1">1
          <input type="radio" name="p${i}" value="X">X
          <input type="radio" name="p${i}" value="2">2
        </td>
      </tr>`;
  });
  document.getElementById("partite").innerHTML=h;
}

function gioca(){
  alert("Schedina salvata (punteggi nel prossimo step)");
}
</script>

</body>
</html>
