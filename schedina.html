<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Fantaschedone</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px }
table { width:100%; background:white; border-collapse:collapse }
th,td { border:1px solid #ccc; padding:10px; text-align:center }
th { background:#2c7be5; color:white }
</style>
</head>

<body>

<h1>⚽ Fantaschedone</h1>

<table>
<thead>
<tr>
<th>#</th>
<th>Partita</th>
<th>Pronostico</th>
</tr>
</thead>
<tbody id="tabella">
<tr><td colspan="3">⏳ Caricamento partite…</td></tr>
</tbody>
</table>

<script>
const WORKER_URL = "https://fantaschedone-api.alloss1979.workers.dev";

async function caricaPartite() {
  try {
    const res = await fetch(WORKER_URL);
    const data = await res.json();

    console.log("JSON COMPLETO:", data);

    // 🔴 QUI È LA DIFFERENZA
    const fixtures = data.response || [];

    if (fixtures.length === 0) {
      document.getElementById("tabella").innerHTML =
        "<tr><td colspan='3'>❌ Nessuna partita trovata</td></tr>";
      return;
    }

    let html = "";

    fixtures.slice(0, 13).forEach((f, i) => {
      html += `
        <tr>
          <td>${i+1}</td>
          <td>${f.teams.home.name} - ${f.teams.away.name}</td>
          <td>
            <input type="radio" name="p${i}">1
            <input type="radio" name="p${i}">X
            <input type="radio" name="p${i}">2
          </td>
        </tr>
      `;
    });

    document.getElementById("tabella").innerHTML = html;

  } catch (e) {
    console.error(e);
    document.getElementById("tabella").innerHTML =
      "<tr><td colspan='3'>❌ Errore caricamento</td></tr>";
  }
}

caricaPartite();
</script>

</body>
</html>
