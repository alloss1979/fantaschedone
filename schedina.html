<!DOCTYPE html>
<html>
<head>
  <title>Fantaschedone</title>
  <link rel="stylesheet" href="css/stile.css">
</head>
<body>

<h1>Fantaschedone</h1>
<p id="utente"></p>
<p id="crediti"></p>

<h2>Schedina</h2>
<div id="partite">Caricamento...</div>

<button onclick="giocaSchedina()">Invia schedina (-10 crediti)</button>
<h2 id="risultato"></h2>

<h2>🏆 Classifica Generale</h2>
<table border="1">
  <tr><th>Utente</th><th>Punti</th></tr>
  <tbody id="classificaGenerale"></tbody>
</table>

<script>
let utente = localStorage.getItem("utente");
if (!utente) location.href = "login.html";

document.getElementById("utente").innerText = "Utente: " + utente;

function getCrediti(){ return parseInt(localStorage.getItem("crediti_"+utente)); }
function setCrediti(v){ localStorage.setItem("crediti_"+utente,v); }

document.getElementById("crediti").innerText = "Crediti: " + getCrediti();

let partite = [];

// 🔥 CARICA RISULTATI AUTOMATICI
fetch("risultati.json")
.then(r => r.json())
.then(data => {
  partite = data;
  let html = "";
  partite.forEach((p,i)=>{
    html += `
      <p>
        <strong>${p.casa} - ${p.trasferta}</strong><br>
        <select id="p${i}">
          <option value="1">1</option>
          <option value="X">X</option>
          <option value="2">2</option>
        </select>
      </p>
    `;
  });
  document.getElementById("partite").innerHTML = html;
});

function giocaSchedina(){
  let crediti = getCrediti();
  if (crediti < 10) return alert("Crediti insufficienti");

  crediti -= 10;
  let punti = 0;

  partite.forEach((p,i)=>{
    let s = document.getElementById("p"+i);
    if (s.value === p.risultato){
      s.className = "giusto";
      punti++;
    } else {
      s.className = "sbagliato";
    }
  });

  crediti += punti * 2;
  setCrediti(crediti);

  let tot = parseInt(localStorage.getItem("punti_"+utente) || 0);
  localStorage.setItem("punti_"+utente, tot + punti);

  document.getElementById("crediti").innerText = "Crediti: " + crediti;
  document.getElementById("risultato").innerText = "Punti giornata: " + punti;

  aggiornaClassifica();
}

function aggiornaClassifica(){
  let arr=[];
  for(let k in localStorage){
    if(k.startsWith("punti_")){
      arr.push({u:k.replace("punti_",""),p:parseInt(localStorage.getItem(k))});
    }
  }
  arr.sort((a,b)=>b.p-a.p);
  let h="";
  arr.forEach(x=>h+=`<tr><td>${x.u}</td><td>${x.p}</td></tr>`);
  document.getElementById("classificaGenerale").innerHTML=h;
}
aggiornaClassifica();
</script>

</body>
</html>
