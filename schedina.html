<!DOCTYPE html>
<html>
<head>
  <title>Fantaschedone</title>
  <link rel="stylesheet" href="css/stile.css">
</head>
<body>

<h2>Fantaschedone – Schedina</h2>

<p id="utente"></p>
<p id="crediti"></p>

<select id="giornataSel" onchange="caricaGiornata()">
  <option value="">Seleziona giornata</option>
  <option value="giornata1.json">Giornata 1</option>
  <option value="giornata2.json">Giornata 2</option>
</select>

<p id="info"></p>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Partita</th>
      <th>Pronostico</th>
      <th>Risultato</th>
    </tr>
  </thead>
  <tbody id="tabella"></tbody>
</table>

<br>
<button id="btnGioca" onclick="gioca()">Invia schedina</button>

<h3 id="esito"></h3>

<script>
let utente = localStorage.getItem("utente");
if(!utente) location.href="login.html";

document.getElementById("utente").innerText = "Utente: "+utente;

let creditiKey = "crediti_"+utente;
let puntiKey = "punti_"+utente;

document.getElementById("crediti").innerText =
  "Crediti: "+localStorage.getItem(creditiKey);

let giornata = null;

function caricaGiornata(){
  fetch(document.getElementById("giornataSel").value)
  .then(r=>r.json())
  .then(d=>{
    giornata=d;
    disegna();
  });
}

function disegna(){
  let ora=new Date();
  let blocco=new Date(giornata.blocco);

  let chiusa = ora >= blocco;

  document.getElementById("info").innerText =
    chiusa ? "⛔ Giornata chiusa" : "⏰ Blocco: "+blocco.toLocaleString();

  document.getElementById("btnGioca").disabled = chiusa;

  let h="";
  giornata.partite.forEach((p,i)=>{
    h+=`
      <tr>
        <td>${i+1}</td>
        <td>${p.casa} - ${p.trasferta}</td>
        <td>
          <input type="radio" name="p${i}" value="1">1
          <input type="radio" name="p${i}" value="X">X
          <input type="radio" name="p${i}" value="2">2
        </td>
        <td class="ris">-</td>
      </tr>`;
  });
  document.getElementById("tabella").innerHTML=h;
}

function gioca(){
  let punti=0;

  giornata.partite.forEach((p,i)=>{
    let scelto = document.querySelector(`input[name="p${i}"]:checked`);
    let cella = document.getElementsByClassName("ris")[i];
    cella.innerText = p.risultato;

    if(scelto && scelto.value === p.risultato){
      punti++;
      cella.style.background="#b7f7b7";
    } else {
      cella.style.background="#f7b7b7";
    }
  });

  let tot = parseInt(localStorage.getItem(puntiKey) || 0);
  localStorage.setItem(puntiKey, tot + punti);

  document.getElementById("esito").innerText =
    "Punti giornata: "+punti;
}
</script>

</body>
</html>
