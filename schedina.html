<!DOCTYPE html>
<html>
<head>
  <title>Fantaschedone</title>
  <link rel="stylesheet" href="css/stile.css">
</head>
<body>

<h1>Fantaschedone</h1>

<p id="utente"></p>
<p id="crediti"></p>

<hr>

<h2>Seleziona giornata</h2>
<select id="giornataSelect" onchange="caricaGiornata()">
  <option value="">-- scegli --</option>
  <option value="giornata1.json">Giornata 1</option>
  <option value="giornata2.json">Giornata 2</option>
</select>

<p id="infoBlocco"></p>

<table border="1" cellpadding="8">
  <thead>
    <tr>
      <th>#</th>
      <th>Partita</th>
      <th>Pronostico</th>
    </tr>
  </thead>
  <tbody id="tabella">
    <tr><td colspan="3">Seleziona una giornata</td></tr>
  </tbody>
</table>

<br>
<button id="btnInvia" onclick="gioca()">Invia schedina</button>

<script>
let utente = localStorage.getItem("utente");
if (!utente) location.href = "login.html";

document.getElementById("utente").innerText = "Utente: " + utente;

function getCrediti(){ return parseInt(localStorage.getItem("crediti_"+utente)); }
document.getElementById("crediti").innerText = "Crediti: " + getCrediti();

let giornata = null;

function caricaGiornata(){
  let file = document.getElementById("giornataSelect").value;
  if(!file) return;

  fetch(file)
  .then(r=>r.json())
  .then(data=>{
    giornata = data;
    mostraGiornata();
  });
}

function mostraGiornata(){
  let html = "";
  giornata.partite.forEach((p,i)=>{
    html += `
      <tr>
        <td>${i+1}</td>
        <td>${p.casa} - ${p.trasferta}</td>
        <td>
          <input type="radio" name="p${i}" value="1">1
          <input type="radio" name="p${i}" value="X">X
          <input type="radio" name="p${i}" value="2">2
        </td>
      </tr>
    `;
  });
  document.getElementById("tabella").innerHTML = html;

  controllaBlocco();
}

function controllaBlocco(){
  let ora = new Date();
  let blocco = new Date(giornata.blocco);

  if(ora >= blocco){
    document.getElementById("infoBlocco").innerText =
      "⛔ Giornata bloccata";
    document.getElementById("btnInvia").disabled = true;
  } else {
    document.getElementById("infoBlocco").innerText =
      "⏰ Blocco schedina: " + blocco.toLocaleString();
    document.getElementById("btnInvia").disabled = false;
  }
}

function gioca(){
  alert("Schedina salvata (logica completa nel prossimo step)");
}
</script>

</body>
</html>
