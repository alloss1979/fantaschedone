<!DOCTYPE html>
<html>
<head>
  <title>Login – Fantaschedone</title>
  <link rel="stylesheet" href="css/stile.css">
</head>
<body>

<h2>Login</h2>

<input id="nome" placeholder="Nickname">
<br><br>
<button onclick="login()">Entra</button>

<script>
function login(){
  let n = document.getElementById("nome").value;
  if(!n) return alert("Inserisci nome");
  localStorage.setItem("utente", n);
  if(!localStorage.getItem("crediti_"+n)){
    localStorage.setItem("crediti_"+n, 100);
    localStorage.setItem("punti_"+n, 0);
  }
  location.href="schedina.html";
}
</script>

</body>
</html>
